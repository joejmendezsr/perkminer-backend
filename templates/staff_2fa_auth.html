<!DOCTYPE html>
<html>
<head>
  <title>Staff 2FA Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container mt-4" style="max-width:400px;">
    <div class="card p-4 shadow">
      <h4 class="mb-3">Enter Authenticator Code</h4>
      <form method="post">
        {{ form.hidden_tag() }}
        <div class="mb-3">
          {{ form.code.label(class="form-label") }}
          {{ form.code(class="form-control", placeholder="6 digit code") }}
        </div>
        <div class="mb-3">
          {{ form.captcha.label(class="form-label") }}
          {{ form.captcha() }}
        </div>
        <button type="submit" class="btn btn-success w-100">{{ form.submit.label.text }}</button>
      </form>
    </div>
  </div>
</body>
</html>
