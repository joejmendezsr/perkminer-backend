<!DOCTYPE html>
<html>
<head>
  <title>Enter Email Login Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container mt-4" style="max-width:400px;">
    <div class="card p-4 shadow">
      <h4 class="mb-3">Verify Staff Login</h4>
      <p>Check your email for a 6-digit login code.</p>
      <form method="post">
        {{ form.hidden_tag() }}
        <div class="mb-3">
          {{ form.code.label(class="form-label") }}
          {{ form.code(class="form-control", placeholder="6 digit code") }}
          <div class="mt-2 small">
            <a href="{{ url_for('staff_resend_code') }}" class="link-primary text-decoration-underline">Resend code</a>
          </div>
        </div>
        <div class="mb-3">
          {{ form.recaptcha() }}
        </div>
        <button type="submit" class="btn btn-success w-100">{{ form.submit.label.text }}</button>
      </form>
    </div>
  </div>
</body>
</html>
