<!DOCTYPE html>
<html>
<head>
  <title>QR Code Scanned! - PerkMiner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { background: #f6fbfd; }
    .qr-landing-card {
      max-width: 430px;
      margin: 50px auto 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px #e0e8f3;
      padding: 2.3em 1.5em;
      text-align: center;
    }
    .perk-icon {
      font-size: 3.5em;
      color: #41b19a;
      margin-bottom: 18px;
    }
    .qr-avatar {
      font-size:2.1em;display:inline-block;background:#e6f6f5;border-radius:50%;padding:18px;margin-bottom:14px;color:#2a5859;
    }
    .btn-lg { font-size:1.15em; }
    @media (max-width: 600px) {
      .qr-landing-card { max-width:97vw;padding:1.2em 6px;}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="qr-landing-card">
      <div class="perk-icon mb-2">
        <i class="bi bi-qr-code-scan"></i>
      </div>
      <h3 class="mb-3" style="font-weight:600;">QR Code Scanned</h3>
      {% if user %}
        <div class="qr-avatar">
          <i class="bi bi-person"></i>
        </div>
        <p style="font-size:1.1em;">This QR code is for user:</p>
        <div class="fw-bold mb-3" style="font-size:1.16em;">
          {{ user.name or user.email }}
        </div>
      {% endif %}
      <p class="mb-4">
        To finalize the transaction,<br>
        please log in as a <span class="fw-semibold">staff</span> or <span class="fw-semibold">business owner</span>.
      </p>
      <a href="{{ url_for('staff_login') }}" class="btn btn-success btn-lg w-100 mb-2">
        <i class="bi bi-person-badge"></i> Staff Login
      </a>
      <a href="{{ url_for('business_login') }}" class="btn btn-outline-primary btn-lg w-100 mb-3">
        <i class="bi bi-briefcase"></i> Business Login
      </a>
      <hr class="my-4">
      <a href="{{ url_for('home') }}" class="btn btn-secondary w-100">Back to Home</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
