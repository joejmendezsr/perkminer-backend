<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PerkMiner{% endblock %}</title>
    <!-- Add your CSS, Bootstrap, etc. here -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <form class="mb-2 d-inline" action="#" method="get">
          <select onchange="window.location.href='/set_language/' + this.value;" class="form-select form-select-sm d-inline w-auto" aria-label="Language picker">
            {% for code, name in LANGUAGES.items() %}
              <option value="{{ code }}" {% if session.get('lang', 'en') == code %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
          </select>
        </form>
            {% block content %}{% endblock %}
        </div>
        <!-- JS if needed -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
