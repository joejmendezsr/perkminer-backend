<!DOCTYPE html>
<html>
<head>
  <title>Set Up Staff 2FA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    .qr-container {
      max-width: 370px;
      margin: 2rem auto 0 auto;
      background: #f8fafb;
      border-radius: 10px;
      padding: 2rem 1rem 1.5rem 1rem;
      text-align: center;
      box-shadow: 0 4px 18px #e3eee9;
    }
    .qr-img {
      width: 200px;
      height: 200px;
      margin: 1.5rem auto;
      display: block;
      background: #fff;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 6px #e0efec;
    }
    @media (max-width: 500px) {
      .qr-img { width: 130px; height: 130px; }
      .qr-container { padding: 1.2rem 0.4rem; }
    }
  </style>
</head>
<body class="bg-light">
  <div class="container">
    <div class="qr-container mt-4">
      <h4>Scan Your 2FA Code</h4>
      <p>
        Use Google Authenticator, Authy, or any OTP app.<br>
        Don’t share this code with anyone.
      </p>
      <img src="data:image/png;base64,{{ qr_b64 }}" class="qr-img" alt="2FA QR Code" />
      <div class="mt-3">
        <a href="{{ url_for('staff_2fa_auth') }}" class="btn btn-success w-100">Enter My 2FA Code</a>
      </div>
    </div>
  </div>
</body>
</html>
