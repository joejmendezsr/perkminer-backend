<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contact - {{ business.business_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
  <h2 class="mb-4 text-center">Contact {{ business.business_name }}</h2>
  <nav class="mb-4 text-center">
    <a href="{{ url_for('public_storefront', store_slug=business.store_slug) }}" class="btn btn-outline-secondary btn-sm mx-1">Home</a>
    <a href="{{ url_for('public_store_products', store_slug=business.store_slug) }}" class="btn btn-outline-primary btn-sm mx-1">Products</a>
    <a href="{{ url_for('public_store_cart', store_slug=business.store_slug) }}" class="btn btn-outline-success btn-sm mx-1">Cart</a>
  </nav>
  <div>
    {{ contact_html | safe }}
  </div>
</div>
</body>
</html>
