<!DOCTYPE html>
<html>
<head>
  <title>Staff Session</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container my-4" style="max-width:700px;">
    <div class="card p-4 shadow">
      <h4>Staff Session #{{ interaction.id }}</h4>
      <div class="mb-3">
        <a href="{{ url_for('staff_finalize_transaction', interaction_id=interaction.id) }}"
          class="btn btn-success w-100 mb-2">
          <i class="bi bi-check2-circle"></i> Finalize Transaction
        </a>
        <a href="{{ url_for('staff_create_quote', interaction_id=interaction.id) }}"
          class="btn btn-primary w-100 mb-2">
          <i class="bi bi-file-earmark-text"></i> Send or Edit Quote
        </a>
      </div>

      <hr>

      <h5>Messages</h5>
      <div class="mb-3" style="max-height:270px;overflow:auto;">
        {% for msg in messages %}
          <div class="mb-2">
            <span class="fw-bold">{{ msg.sender_type|capitalize }}</span>
            <small class="text-muted">{{ msg.timestamp.strftime('%Y-%m-%d %H:%M') }}</small>
            <div>{{ msg.text }}</div>
            {% if msg.file_url %}
              <div><a href="{{ msg.file_url }}" target="_blank">{{ msg.file_name or "Attachment" }}</a></div>
            {% endif %}
          </div>
        {% endfor %}
      </div>

      <form method="post" enctype="multipart/form-data" class="mt-3">
        <div class="input-group mb-2">
          <textarea name="message_text" class="form-control" placeholder="Type your message..." rows="2"></textarea>
          <button type="submit" class="btn btn-secondary"><i class="bi bi-send"></i> Send</button>
        </div>
        <input type="file" name="message_file" class="form-control">
      </form>
    </div>
  </div>
</body>
</html>
