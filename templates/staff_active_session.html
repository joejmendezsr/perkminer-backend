<!DOCTYPE html>
<html>
<head>
  <title>Staff Session</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-light">
  <div class="container my-4" style="max-width:700px;">
    <div class="card p-4 shadow">
      <h4>Staff Session #{{ interaction.id }}</h4>
      {% if interaction.status == 'ended' %}
        <div class="alert alert-warning mb-2 text-center">
          This session has ended. You cannot send or receive new messages.
        </div>
      {% endif %}
      <form method="post" action="{{ url_for('end_session', interaction_id=interaction.id) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="tab" value="businesses">
        <button type="submit" class="btn btn-danger w-100 mb-2" {% if interaction.status == 'ended' %}disabled{% endif %}>
          <i class="bi bi-x-circle"></i> End Session
        </button>
      </form>
      <div class="mb-3">
        <a href="{{ url_for('staff_finalize_transaction', interaction_id=interaction.id) }}"
          class="btn btn-success w-100 mb-2 {% if interaction.status == 'ended' %}disabled{% endif %}">
          <i class="bi bi-check2-circle"></i> Finalize Transaction
        </a>
        <a href="{{ url_for('staff_create_quote', interaction_id=interaction.id) }}"
          class="btn btn-primary w-100 mb-2 {% if interaction.status == 'ended' %}disabled{% endif %}">
          <i class="bi bi-file-earmark-text"></i> Send or Edit Quote
        </a>
      </div>

      <hr>
      <h5>Messages</h5>
      <div class="mb-3" id="messages-box" style="max-height:270px;overflow:auto;">
        {% include "partials/_staff_messages.html" %}
      </div>

      <form method="post" enctype="multipart/form-data" class="mt-3" id="staff-chat-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="input-group mb-2">
          <textarea name="message_text" class="form-control" placeholder="Type your message..." rows="2" {% if interaction.status == 'ended' %}disabled{% endif %}></textarea>
          <button type="submit" class="btn btn-secondary" {% if interaction.status == 'ended' %}disabled{% endif %}>
            <i class="bi bi-send"></i> Send
          </button>
        </div>
        <input type="file" name="message_file" class="form-control" {% if interaction.status == 'ended' %}disabled{% endif %}>
      </form>
    </div>
  </div>
<script>
function scrollToBottom() {
  var box = document.getElementById('messages-box');
  if (box) { box.scrollTop = box.scrollHeight; }
}
function reloadMessages() {
  fetch("{{ url_for('staff_session_messages', interaction_id=interaction.id) }}")
    .then(res => res.text())
    .then(html => {
      document.getElementById('messages-box').innerHTML = html;
      scrollToBottom();
    });
}
// Only poll if session is not ended
{% if interaction.status != 'ended' %}
  setInterval(reloadMessages, 3500);
{% endif %}
scrollToBottom();
</script>
</body>
</html>
