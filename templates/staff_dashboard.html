<!DOCTYPE html>
<html>
<head>
  <title>Staff Dashboard - PerkMiner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    .dashboard-card { max-width: 660px; margin:32px auto; border-radius:16px; box-shadow:0 4px 16px #e3e9ef; background:#f9fafd;padding:2em 1.4em;}
    .staff-email { color:#2a5859; font-weight:bold; }
    .session-list li { margin-bottom:13px; }
    @media (max-width: 650px) {
      .dashboard-card { margin:12px auto; padding:1em 6px; }
    }
  </style>
</head>
<body class="bg-light">
  <div class="container">
    <div class="dashboard-card">
      <div class="d-flex flex-wrap mb-2 align-items-center">
        <div class="flex-grow-1">
          <h2 class="mb-0" style="font-size:1.5em;">Welcome, <span class="staff-email">{{ staff.email }}</span></h2>
        </div>
        <div>
          <a href="{{ url_for('staff_logout') }}" class="btn btn-outline-danger">
            <i class="bi bi-box-arrow-right"></i> Log Out
          </a>
        </div>
      </div>
      <hr>
      <a href="{{ url_for('staff_change_password') }}" class="btn btn-outline-primary w-100 mb-3">Change Password</a>

      <h5 class="mt-4 mb-2">Active Sessions</h5>
      <ul class="list-group session-list">
        {% for ia in interactions %}
        <li class="list-group-item d-flex flex-column flex-md-row justify-content-between align-items-md-center">
          <div>
            <b>Session #{{ ia.id }}</b>
            <span class="text-muted d-block" style="font-size:0.95em;">
              User: {{ ia.user.email }}
            </span>
          </div>
          <div class="mt-2 mt-md-0 d-flex gap-2 flex-wrap">
            <a href="{{ url_for('staff_active_session', interaction_id=ia.id) }}" class="btn btn-secondary btn-sm">
              Open Session
            </a>
            <a href="{{ url_for('staff_scan_qr', interaction_id=ia.id) }}" class="btn btn-success btn-sm">
              <i class="bi bi-upc-scan"></i> Scan QR Code
            </a>
            <a href="{{ url_for('staff_finalize_transaction', interaction_id=ia.id) }}" class="btn btn-outline-primary btn-sm">
              Finalize Manually
            </a>
          </div>
        </li>
        {% else %}
        <li class="list-group-item">No active sessions found.</li>
        {% endfor %}
      </ul>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
