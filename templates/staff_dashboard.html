<!DOCTYPE html>
<html>
<head>
  <title>Staff Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container my-4" style="max-width:700px;">
    <div class="card p-4 shadow">
      <h3>Welcome, {{ staff.email }}</h3>
      <a href="{{ url_for('staff_logout') }}" class="btn btn-outline-danger w-100 mb-2">
        <i class="bi bi-box-arrow-right"></i> Staff Log Out
      </a>
      <h5>Active Sessions ({{ interactions|length }})</h5>
      <ul class="list-group">
        {% for ia in interactions %}
          <li class="list-group-item d-flex flex-column flex-md-row justify-content-between">
            <span>
              Session #{{ ia.id }}<br>
              User: {{ ia.user.email }}
            </span>
            <span class="mt-2 mt-md-0">
              <a href="{{ url_for('staff_active_session', interaction_id=ia.id) }}" class="btn btn-primary btn-sm">Open</a>
            </span>
          </li>
        {% else %}
          <li class="list-group-item">No active sessions.</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</body>
</html>
